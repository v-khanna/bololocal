name: Bolo
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Qwen3Speech:
    url: https://github.com/soniqo/speech-swift
    from: 0.0.9
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.30.0
options:
  bundleIdPrefix: com.virkhanna
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ARCHS: arm64
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  Bolo:
    type: application
    platform: macOS
    sources:
      - path: Bolo
    resources:
      - path: Bolo/Engine/Chatterbox/Resources
    info:
      path: Bolo/Resources/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "Bolo reads the text you select in any app and speaks it aloud. Accessibility access is required to read selected text from other applications."
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Vir Khanna"
    entitlements:
      path: Bolo/Bolo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - package: KeyboardShortcuts
      - package: Qwen3Speech
        product: Qwen3TTS
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift
        product: MLXRandom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.virkhanna.bololocal
        PRODUCT_NAME: BoloLocal
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  BoloTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BoloTests
    dependencies:
      - target: Bolo
      - package: mlx-swift
        product: MLXRandom
    settings:
      base:
        ARCHS: arm64
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BoloLocal.app/Contents/MacOS/BoloLocal
        GENERATE_INFOPLIST_FILE: YES
