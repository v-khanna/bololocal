name: Bolo
packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0
  Qwen3Speech:
    url: https://github.com/soniqo/speech-swift
    from: 0.0.9
options:
  bundleIdPrefix: com.virkhanna
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ARCHS: arm64
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  Bolo:
    type: application
    platform: macOS
    sources:
      - path: Bolo
    info:
      path: Bolo/Resources/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "Bolo reads the text you select in any app and speaks it aloud. Accessibility access is required to read selected text from other applications."
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Vir Khanna"
    entitlements:
      path: Bolo/Bolo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - package: HotKey
      - package: Qwen3Speech
        product: Qwen3TTS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.virkhanna.bolo
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  BoloTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BoloTests
    dependencies:
      - target: Bolo
    settings:
      base:
        ARCHS: arm64
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Bolo.app/Contents/MacOS/Bolo
        GENERATE_INFOPLIST_FILE: YES
